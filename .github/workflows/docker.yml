name: Docker Build and Push

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest
            ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pull instructions
        run: |
          echo "Image pushed successfully!"
          echo "Pull and run:"
          echo "  docker pull ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest"
          echo "  docker run -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest"
          echo "  Open: http://localhost:8000/docs"
