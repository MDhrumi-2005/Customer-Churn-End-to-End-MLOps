name: Docker Build and Push

# ─────────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────────
# Runs automatically when:
#   1. The pipeline workflow commits a new best_model.pkl
#   2. app_api.py changes (API code update)
#   3. Dockerfile changes
#   4. Manual trigger
on:
  push:
    branches: [ "main" ]
    paths:
      - "models/best_model.pkl"           # new model trained
      - "models/best_model_metadata.json" # model metadata changed
      - "artifacts/feature_engineering/preprocessor.pkl"
      - "app_api.py"                      # API code changed
      - "Dockerfile"                      # container config changed
      - "requirements.txt"                # dependencies changed
  workflow_dispatch:

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Login to Docker Hub ─────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ── 3. Set up Buildx ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Build and push ──────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest
            ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 5. Print instructions ──────────────────────────────
      - name: Pull and run instructions
        run: |
          echo "================================================"
          echo "  New Docker image pushed!"
          echo "================================================"
          echo ""
          echo "  Pull and run:"
          echo "  docker pull ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest"
          echo "  docker run -p 8000:8000 ${{ secrets.DOCKER_USERNAME }}/mlops-churn-pipeline:latest"
          echo ""
          echo "  API: http://localhost:8000/docs"
          echo "================================================"
