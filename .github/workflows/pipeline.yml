name: MLOps Pipeline CI

# ─────────────────────────────────────────────────────────────
# Triggers automatically when:
#   - Raw data changes  (watch_and_push.py handles the git push)
#   - Pipeline code changes
#   - Hyperparameters change
#   - Manual trigger
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "main" ]
    paths:
      - "data/raw/**"
      - "data/raw.dvc"
      - "src/components/**"
      - "config/params.yaml"
      - "main.py"
  workflow_dispatch:

jobs:
  retrain-and-deploy:
    name: Retrain Pipeline and Commit Model
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push model back to repo

    steps:
      # ── 1. Checkout ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Python setup ────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Cache pip ───────────────────────────────────────
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # ── 4. Install dependencies ────────────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # ── 5. Run full 6-stage pipeline ───────────────────────
      - name: Run MLOps pipeline
        run: python main.py
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      # ── 6. Show results ────────────────────────────────────
      - name: Show model results
        run: |
          echo "════════════════════════════════════════"
          echo "  LEADERBOARD"
          echo "════════════════════════════════════════"
          cat models/model_scores.csv
          echo ""
          echo "  BEST MODEL"
          cat models/best_model_metadata.json
          echo "════════════════════════════════════════"

      # ── 7. Auto-commit new model back to repo ──────────────
      #    New model files get committed back automatically.
      #    This commit triggers the Docker workflow.
      - name: Commit new model artifacts
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add models/best_model.pkl
          git add models/best_model_metadata.json
          git add models/model_scores.csv
          git add models/RandomForest.pkl
          git add models/XGBoost.pkl
          git add models/LightGBM.pkl
          git add artifacts/feature_engineering/preprocessor.pkl
          git add artifacts/feature_engineering/X_train.csv
          git add artifacts/feature_engineering/X_test.csv
          git add artifacts/feature_engineering/y_train.csv
          git add artifacts/feature_engineering/y_test.csv
          git add reports/metrics.json

          if git diff --staged --quiet; then
            echo "Model unchanged — no commit needed"
          else
            BEST=$(python -c "import json; d=json.load(open('models/best_model_metadata.json')); print(d['best_model'])")
            AUC=$(python  -c "import json; d=json.load(open('models/best_model_metadata.json')); print(round(d['roc_auc'],4))")
            git commit -m "ci: auto-retrain | best=${BEST} roc_auc=${AUC} [skip ci]"
            git push
            echo "New model committed — Docker workflow will trigger automatically"
          fi

      # ── 8. Save artifacts to GitHub ────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.run_number }}
          path: |
            models/model_scores.csv
            models/best_model_metadata.json
            reports/metrics.json
          retention-days: 30
