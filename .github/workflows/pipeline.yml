name: MLOps Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    name: Run DVC Pipeline
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Cache pip packages for faster runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 5. Run complete pipeline (data already in repo)
      - name: Run MLOps pipeline
        run: python main.py
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db

      # 6. Show model metrics
      - name: Show model metrics
        run: |
          echo "================================================"
          echo "  MODEL LEADERBOARD"
          echo "================================================"
          cat models/model_scores.csv
          echo ""
          echo "================================================"
          echo "  BEST MODEL METADATA"
          echo "================================================"
          cat models/best_model_metadata.json

      # 7. Upload reports and models as artifacts
      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-outputs
          path: |
            models/model_scores.csv
            models/best_model_metadata.json
            reports/metrics.json
          retention-days: 30
